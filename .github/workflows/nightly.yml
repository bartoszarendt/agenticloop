name: Nightly full matrix

# Complete 2x2 Node/OS matrix (full suite plus all quality checks), including
# the combinations omitted by the pairwise push/PR workflow.
on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC daily
  workflow_dispatch: {}

jobs:
  full-matrix:
    name: Full matrix / ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Validate
        run: node bin/agenticloop.js validate

      - name: Typecheck
        run: npm run typecheck

      - name: Pack dry run
        run: npm pack --dry-run
