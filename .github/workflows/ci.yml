name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  # Full acceptance suite. Pairwise OS/Node coverage keeps the minimum declared
  # Node version (20) on a full run and preserves full real-Git/worktree coverage
  # on Windows, without running the whole 2x2 matrix on every push/PR.
  full-suite:
    name: Full suite / ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 20.x
          - os: windows-latest
            node-version: 22.x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

  # Fast cross-compatibility signal on the opposite OS/Node pairing. Runs the
  # curated fast tier so every OS and every supported Node version is exercised on
  # each PR, while the expensive suite runs only on the two full-suite pairings.
  fast-compat:
    name: Fast compat / ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 22.x
          - os: windows-latest
            node-version: 20.x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Fast tests
        run: npm run test:fast

  # Quality checks are OS/Node-invariant, so run them once instead of 4x.
  quality:
    name: Quality checks / Ubuntu / Node 22
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate
        run: node bin/agenticloop.js validate

      - name: Typecheck
        run: npm run typecheck

      - name: Pack dry run
        run: npm pack --dry-run
